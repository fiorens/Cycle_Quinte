<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accordeur</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #3498db;
            --accent: #2ecc71;
            --danger: #e74c3c;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        .tuner-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .note-display { font-size: 5.5rem; font-weight: 900; margin: 0; line-height: 1; color: var(--primary); }
        .octave { font-size: 1.8rem; color: #555; vertical-align: super; margin-left: 5px; }
        .freq { font-family: monospace; color: #444; margin: 15px 0; font-size: 1rem; }

        .gauge-container {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 25px 0;
            background: #252525;
            border-radius: 12px;
            display: flex; align-items: center;
            overflow: hidden;
            border: 1px solid #333;
        }

        .center-line {
            position: absolute;
            left: 50%; width: 2px; height: 100%;
            background: rgba(255,255,255,0.2);
            z-index: 1;
        }

        #needle {
            position: absolute;
            left: 50%; width: 5px; height: 35px;
            background: var(--primary);
            border-radius: 3px;
            transform: translateX(-50%);
            transition: left 0.1s linear; /* Transition plus rapide pour la précision */
            z-index: 2;
        }

        .controls { display: flex; gap: 10px; margin-top: 20px; }

        .btn {
            flex: 1; padding: 18px; border-radius: 15px;
            border: none; font-size: 1.1rem; font-weight: bold;
            color: white; cursor: pointer; transition: 0.2s;
        }

        #startBtn { background: var(--primary); }
        #stopBtn { background: var(--danger); display: none; }

        .wakelock-status {
            font-size: 0.7rem; color: #444; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
<link rel="icon" type="image/svg+xml" href="Accordeur.svg"> 
</head>
<body>

<div class="tuner-card">
    <div class="note-display"><span id="note">--</span><span id="octave" class="octave"></span></div>
    <div class="freq" id="freqText">00.00 Hz</div>

    <div class="gauge-container">
        <div class="center-line"></div>
        <div id="needle"></div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn">DÉMARRER</button>
        <button id="stopBtn" class="btn">STOP</button>
    </div>

    <div id="wakelockMsg" class="wakelock-status">Veille autorisée</div>
</div>

<script>
    const noteStrings = ["Do", "Do♯", "Ré", "Ré♯", "Mi", "Fa", "Fa♯", "Sol", "Sol♯", "La", "La♯", "Si"];
    let audioCtx = null, analyser = null, stream = null, wakeLock = null;
    let isRunning = false;
    let lastCents = 0;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const wlMsg = document.getElementById('wakelockMsg');

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                wlMsg.innerText = "☀ Écran toujours actif";
                wlMsg.style.color = "var(--accent)";
            }
        } catch (err) { console.log(err); }
    }

    function releaseWakeLock() {
        if (wakeLock) {
            wakeLock.release().then(() => {
                wakeLock = null;
                wlMsg.innerText = "Veille autorisée";
                wlMsg.style.color = "#444";
            });
        }
    }

    async function start() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: false, 
                    noiseSuppression: false, 
                    autoGainControl: false 
                } 
            });
            
            let source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096; // Haute résolution
            source.connect(analyser);
            
            isRunning = true;
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            
            requestWakeLock();
            update();
        } catch (e) { alert("Micro non détecté."); }
    }

    function stop() {
        isRunning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();
        
        startBtn.style.display = "block";
        stopBtn.style.display = "none";
        document.getElementById('note').innerText = "--";
        document.getElementById('octave').innerText = "";
        document.getElementById('freqText').innerText = "00.00 Hz";
        document.getElementById('needle').style.left = "50%";
        
        releaseWakeLock();
    }

    function update() {
        if (!isRunning) return;

        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        
        let sum = 0;
        for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
        let rms = Math.sqrt(sum / buffer.length);

        if (rms > 0.02) {
            let freq = pitchDetection(buffer, audioCtx.sampleRate);
            if (freq > 0 && freq < 2000) {
                let number = 12 * (Math.log(freq / 440) / Math.log(2)) + 69;
                let noteIndex = Math.round(number) % 12;
                let octave = Math.floor(Math.round(number) / 12) - 1;
                let cents = (number - Math.round(number)) * 100;

                // Lissage adaptatif pour la stabilité visuelle
                lastCents = (lastCents * 0.6) + (cents * 0.4);

                document.getElementById('note').innerText = noteStrings[noteIndex];
                document.getElementById('octave').innerText = octave;
                document.getElementById('freqText').innerText = freq.toFixed(2) + " Hz";
                
                let pos = 50 + lastCents;
                document.getElementById('needle').style.left = Math.max(0, Math.min(100, pos)) + "%";
                document.getElementById('needle').style.background = Math.abs(lastCents) < 5 ? "var(--accent)" : "var(--primary)";
            }
        }
        requestAnimationFrame(update);
    }

    // Algorithme amélioré avec interpolation parabolique
    function pitchDetection(buffer, sampleRate) {
        let n = buffer.length;
        let correlations = new Float32Array(n);
        
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n - i; j++) {
                correlations[i] += buffer[j] * buffer[j + i];
            }
        }

        let d = 0; 
        while (correlations[d] > correlations[d + 1]) d++;
        
        let maxval = -1, maxpos = -1;
        for (let i = d; i < n; i++) {
            if (correlations[i] > maxval) {
                maxval = correlations[i];
                maxpos = i;
            }
        }

        let T0 = maxpos;

        // --- Interpolation parabolique pour une précision sous le pixel ---
        let x1 = correlations[T0 - 1], x2 = correlations[T0], x3 = correlations[T0 + 1];
        let a = (x1 + x3 - 2 * x2) / 2;
        let b = (x3 - x1) / 2;
        if (a) T0 = T0 - b / (2 * a);

        return sampleRate / T0;
    }

    startBtn.onclick = start;
    stopBtn.onclick = stop;
</script>
</body>
</html>
