<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle des Quintes</title>
<style>
  :root {
    --text-main: #333;
    --grey-dark: #666;
    --grey-light: #f4f4f4;
    --green-musicca: #79b94b;
    --yellow-rn: #fbc02d; 
    --blue-alt: #4a90e2;
    --wheel-size: 360px; 
    --note-size: 55px;
  }

  body {
    font-family: -apple-system, sans-serif;
    color: var(--text-main);
    background-color: #fff;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .switch-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-weight: 500;
    background: var(--grey-light);
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    user-select: none;
    border: 1px solid #ddd;
  }

  .wheel-container {
    position: relative;
    width: var(--wheel-size);
    height: var(--wheel-size);
    margin: 30px 0;
  }

  .cycle-wheel {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: 
      radial-gradient(circle, white 30%, transparent 31%),
      radial-gradient(circle, var(--grey-light) 50%, transparent 51%),
      radial-gradient(circle, #e0e0e0 70%, transparent 71%);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .note {
    position: absolute;
    width: var(--note-size);
    height: var(--note-size);
    left: 50%; top: 50%;
    margin-left: calc(var(--note-size) / -2);
    margin-top: calc(var(--note-size) / -2);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s ease;
    z-index: 10;
    --angle: calc(var(--i) * 30deg - 90deg);
    transform: translate(calc(cos(var(--angle)) * var(--r)), calc(sin(var(--angle)) * var(--r)));
  }

  .note.major { --r: 130px; font-size: 1rem; color: var(--text-main); }
  .note.minor { --r: 85px; font-size: 0.75rem; color: var(--grey-dark); }

  .note.active { background-color: var(--grey-dark) !important; color: white !important; }
  .note.neighbor { background-color: var(--green-musicca) !important; color: white !important; }
  .cycle-wheel.has-selection .note:not(.active):not(.neighbor) { opacity: 0.3; }

  .rn-badge {
    position: absolute;
    width: 22px; height: 22px;
    background-color: var(--yellow-rn);
    color: white;
    border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 0.7rem; font-weight: bold;
    pointer-events: none;
    --angle-badge: calc(var(--i) * 30deg - 90deg);
    --r-badge: 25px;
    transform: translate(calc(cos(var(--angle-badge)) * var(--r-badge)), calc(sin(var(--angle-badge)) * var(--r-badge)));
    z-index: 11;
  }

  .armure-panel {
    width: 100%; max-width: 600px;
    text-align: center; padding: 10px; margin-bottom: 10px;
    border-bottom: 2px solid var(--grey-light);
    font-size: 1rem; color: var(--blue-alt); font-weight: 500;
    min-height: 3.5em;
  }

  .info-panel {
    width: 100%; max-width: 600px;
    background-color: var(--grey-light);
    border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px;
  }

  .chord-table {
    width: 100%; border-collapse: collapse; margin-top: 15px;
    background-color: white; border-radius: 4px; overflow: hidden;
  }

  .chord-table th, .chord-table td { border: 1px solid #e0e0e0; padding: 10px; text-align: center; }
  .chord-table th { background-color: #fafafa; color: var(--grey-dark); font-weight: normal; font-size: 0.8rem; }

  .reset-btn {
  margin-top: 30px;
  padding: 10px 25px;
  background-color: var(--grey-dark);
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: opacity 0.2s;
}

.reset-btn:hover {
  opacity: 0.8;
}

  @media (min-width: 600px) {
    :root { --wheel-size: 480px; --note-size: 70px; }
    .note.major { --r: 180px; font-size: 1.1rem; }
    .note.minor { --r: 120px; font-size: 0.9rem; }
  }
</style>
<link rel="icon" type="image/svg+xml" href="Cycle.svg">
</head>
<body>

  <div class="switch-container" id="notation-switch">
    Notation : <span id="current-notation">Anglaise (C, D, E...)</span>
  </div>

  <div class="wheel-container">
    <div id="cycle" class="cycle-wheel">
      <div class="note major" style="--i: 0;" data-index="0" data-note="C">C</div>
      <div class="note major" style="--i: 1;" data-index="1" data-note="G">G</div>
      <div class="note major" style="--i: 2;" data-index="2" data-note="D">D</div>
      <div class="note major" style="--i: 3;" data-index="3" data-note="A">A</div>
      <div class="note major" style="--i: 4;" data-index="4" data-note="E">E</div>
      <div class="note major" style="--i: 5;" data-index="5" data-note="B">B</div>
      <div class="note major" style="--i: 6;" data-index="6" data-note="F♯/G♭">F♯<br>G♭</div>
      <div class="note major" style="--i: 7;" data-index="7" data-note="D♭">D♭</div>
      <div class="note major" style="--i: 8;" data-index="8" data-note="A♭">A♭</div>
      <div class="note major" style="--i: 9;" data-index="9" data-note="E♭">E♭</div>
      <div class="note major" style="--i: 10;" data-index="10" data-note="B♭">B♭</div>
      <div class="note major" style="--i: 11;" data-index="11" data-note="F">F</div>

      <div class="note minor" style="--i: 0;" data-index="0" data-note="Am">Am</div>
      <div class="note minor" style="--i: 1;" data-index="1" data-note="Em">Em</div>
      <div class="note minor" style="--i: 2;" data-index="2" data-note="Bm">Bm</div>
      <div class="note minor" style="--i: 3;" data-index="3" data-note="F♯m">F♯m</div>
      <div class="note minor" style="--i: 4;" data-index="4" data-note="C♯m">C♯m</div>
      <div class="note minor" style="--i: 5;" data-index="5" data-note="G♯m">G♯m</div>
      <div class="note minor" style="--i: 6;" data-index="6" data-note="D♯m/E♭m">D♯m<br>E♭m</div>
      <div class="note minor" style="--i: 7;" data-index="7" data-note="B♭m">B♭m</div>
      <div class="note minor" style="--i: 8;" data-index="8" data-note="Fm">Fm</div>
      <div class="note minor" style="--i: 9;" data-index="9" data-note="Cm">Cm</div>
      <div class="note minor" style="--i: 10;" data-index="10" data-note="Gm">Gm</div>
      <div class="note minor" style="--i: 11;" data-index="11" data-note="Dm">Dm</div>
    </div>
  </div>

  <div id="armure-panel" class="armure-panel">Sélectionnez une note</div>

  <div class="info-panel">
    <div class="info-title">Tonalité : <span id="current-key">-</span></div>
    <div id="relative-info" style="color: var(--grey-dark); font-size: 0.9rem; margin-bottom: 10px;"></div>
    
    <table class="chord-table">
      <thead>
        <tr><th>I</th><th>ii</th><th>iii</th><th>IV</th><th>V</th><th>vi</th><th>vii°</th></tr>
      </thead>
      <tbody id="chord-row">
        <tr><td colspan="7">Cliquez sur une note</td></tr>
      </tbody>
    </table>
  </div>

  <button class="reset-btn" onclick="location.reload()">Mise à zéro</button>

  <script>
    let isFrench = false;
    let selectedNoteData = null;

    const translationMap = { 'C': 'Do', 'D': 'Ré', 'E': 'Mi', 'F': 'Fa', 'G': 'Sol', 'A': 'La', 'B': 'Si' };

    function translate(text) {
      if (!isFrench) return text;
      return text.replace(/\b[A-G](?=[♯#♭b\s]|$)/g, m => translationMap[m] || m);
    }

    const cycle = document.getElementById('cycle');
    const notes = document.querySelectorAll('.note');
    const majorNotes = document.querySelectorAll('.note.major');
    const minorNotes = document.querySelectorAll('.note.minor');
    const armurePanel = document.getElementById('armure-panel');
    const currentKeyDisplay = document.getElementById('current-key');
    const relativeInfo = document.getElementById('relative-info');
    const chordRow = document.getElementById('chord-row');
    const switchBtn = document.getElementById('notation-switch');

    const majorData = [
      { name: "C", rel: "Am", chords: ["C", "Dm", "Em", "F", "G", "Am", "Bdim"], arm: "Aucune altération" },
      { name: "G", rel: "Em", chords: ["G", "Am", "Bm", "C", "D", "Em", "F♯dim"], arm: "1 dièse : F♯" },
      { name: "D", rel: "Bm", chords: ["D", "Em", "F♯m", "G", "A", "Bm", "C♯dim"], arm: "2 dièses : F♯, C♯" },
      { name: "A", rel: "F♯m", chords: ["A", "Bm", "C♯m", "D", "E", "F♯m", "G♯dim"], arm: "3 dièses : F♯, C♯, G♯" },
      { name: "E", rel: "C♯m", chords: ["E", "F♯m", "G♯m", "A", "B", "C♯m", "D♯dim"], arm: "4 dièses : F♯, C♯, G♯, D♯" },
      { name: "B", rel: "G♯m", chords: ["B", "C♯m", "D♯m", "E", "F♯", "G♯m", "A♯dim"], arm: "5 dièses : F♯, C♯, G♯, D♯, A♯" },
      { name: "F♯ / G♭", rel: "D♯m / E♭m", chords: ["F♯", "G♯m", "A♯m", "B", "C♯", "D♯m", "E♯dim"], arm: "6 dièses : F♯, C♯, G♯, D♯, A♯, E♯<br>6 bémols : B♭, E♭, A♭, D♭, G♭, C♭" },
      { name: "D♭", rel: "B♭m", chords: ["D♭", "E♭m", "Fm", "G♭", "A♭", "B♭m", "Cdim"], arm: "5 bémols : B♭, E♭, A♭, D♭, G♭" },
      { name: "A♭", rel: "Fm", chords: ["A♭", "B♭m", "Cm", "D♭", "E♭", "Fm", "Gdim"], arm: "4 bémols : B♭, E♭, A♭, D♭" },
      { name: "E♭", rel: "Cm", chords: ["E♭", "Fm", "Gm", "A♭", "B♭", "Cm", "Ddim"], arm: "3 bémols : B♭, E♭, A♭" },
      { name: "B♭", rel: "Gm", chords: ["B♭", "Cm", "Dm", "E♭", "F", "Gm", "Adim"], arm: "2 bémols : B♭, E♭" },
      { name: "F", rel: "Dm", chords: ["F", "Gm", "Am", "B♭", "C", "Dm", "Edim"], arm: "1 bémol : B♭" }
    ];

    const minorData = majorData.map((d) => ({
      name: d.rel, rel: d.name, arm: d.arm,
      chords: [d.chords[5], d.chords[6], d.chords[0], d.chords[1], d.chords[2], d.chords[3], d.chords[4]]
    }));

    function refreshUI() {
      notes.forEach(note => {
        const rawNote = note.dataset.note;
        const translatedText = translate(rawNote).replace('/', '<br>');
        const badges = note.querySelectorAll('.rn-badge');
        note.innerHTML = translatedText; 
        badges.forEach(b => note.appendChild(b)); 
      });

      if (selectedNoteData) {
        const { data, isMajor } = selectedNoteData;
        currentKeyDisplay.innerText = translate(data.name) + (isMajor ? " Majeur" : " mineur");
        relativeInfo.innerText = isMajor ? `Relative mineure : ${translate(data.rel)}` : `Relative majeure : ${translate(data.rel)}`;
        chordRow.innerHTML = `<tr>${data.chords.map(c => `<td>${translate(c)}</td>`).join('')}</tr>`;
        armurePanel.innerHTML = "Armure : " + translate(data.arm);
      }
      document.getElementById('current-notation').innerText = isFrench ? "Française (Do, Ré, Mi...)" : "Anglaise (C, D, E...)";
    }

    switchBtn.addEventListener('click', () => { isFrench = !isFrench; refreshUI(); });

    notes.forEach(note => {
      note.addEventListener('click', () => {
        const index = parseInt(note.dataset.index);
        const isMajor = note.classList.contains('major');
        selectedNoteData = { data: isMajor ? majorData[index] : minorData[index], isMajor };

        notes.forEach(n => n.classList.remove('active', 'neighbor'));
        document.querySelectorAll('.rn-badge').forEach(b => b.remove());
        cycle.classList.add('has-selection');

        const pos = (off) => (index + off + 12) % 12;

        if (isMajor) {
          highlight(majorNotes[pos(0)], 'I', pos(0));
          highlight(majorNotes[pos(-1)], 'IV', pos(-1));
          highlight(majorNotes[pos(1)], 'V', pos(1));
          highlight(minorNotes[pos(0)], 'vi', pos(0));
          highlight(minorNotes[pos(-1)], 'ii', pos(-1));
          highlight(minorNotes[pos(1)], 'iii', pos(1));
          highlight(minorNotes[pos(2)], 'vii°', pos(2));
          majorNotes[pos(0)].classList.add('active');
        } else {
          highlight(minorNotes[pos(0)], 'i', pos(0));
          highlight(minorNotes[pos(-1)], 'iv', pos(-1));
          highlight(minorNotes[pos(1)], 'v', pos(1));
          highlight(majorNotes[pos(0)], 'III', pos(0));
          highlight(majorNotes[pos(-1)], 'VI', pos(-1));
          highlight(majorNotes[pos(1)], 'VII', pos(1));
          highlight(minorNotes[pos(2)], 'ii°', pos(2));
          minorNotes[pos(0)].classList.add('active');
        }
        refreshUI();
      });
    });

    function highlight(el, label, idx) {
      el.classList.add('neighbor');
      const badge = document.createElement('div');
      badge.className = 'rn-badge';
      badge.innerText = label;
      badge.style.setProperty('--i', idx);
      el.appendChild(badge);
    }
    refreshUI();
  </script>
</body>
</html>
