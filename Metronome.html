<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordeur Stable</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --primary: #4a90e2;
            --accent: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .tuner-card {
            background: white;
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            width: 380px;
            position: relative;
        }

        .note-display {
            font-size: 6rem;
            font-weight: 900;
            margin: 0;
            color: var(--dark);
            transition: color 0.2s;
        }

        .octave { font-size: 2rem; color: #bdc3c7; vertical-align: super; }

        .freq-info { font-family: monospace; color: #95a5a6; margin-bottom: 20px; }

        /* Jauge stabilisée */
        .gauge-area { margin: 30px 0; position: relative; }
        
        .gauge-bar {
            height: 10px; background: #ecf0f1;
            border-radius: 5px; position: relative;
        }

        .needle {
            position: absolute;
            top: -10px; left: 50%;
            width: 4px; height: 30px;
            background: var(--primary);
            border-radius: 2px;
            transform: translateX(-50%);
            transition: left 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .center-line {
            position: absolute;
            left: 50%; top: -15px;
            width: 2px; height: 40px;
            background: #dfe6e9;
            transform: translateX(-50%);
        }

        .controls { margin-top: 30px; }

        .btn {
            width: 100%; padding: 18px; border-radius: 20px;
            border: none; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .vumeter {
            height: 4px; width: 0%; background: var(--accent);
            margin-top: 10px; transition: width 0.1s; border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="tuner-card">
    <div class="note-display"><span id="note">--</span><span id="octave" class="octave"></span></div>
    <div class="freq-info" id="freq">00.00 Hz</div>

    <div class="gauge-area">
        <div class="center-line"></div>
        <div class="gauge-bar">
            <div id="needle" class="needle"></div>
        </div>
        <div id="vumeter" class="vumeter"></div>
    </div>

    <div class="controls">
        <button id="toggleBtn" class="btn btn-start">ACTIVER LE MICRO</button>
    </div>
</div>

<script>
    const noteStrings = ["Do", "Do♯", "Ré", "Ré♯", "Mi", "Fa", "Fa♯", "Sol", "Sol♯", "La", "La♯", "Si"];
    let audioCtx = null;
    let analyser = null;
    let source = null;
    let stream = null;
    let isRunning = false;
    let animationId = null;

    // Variables de lissage
    let lastCents = 0;
    const smoothing = 0.8; // Plus c'est haut, plus c'est stable (0.1 à 0.9)

    async function toggleMicrophone() {
        if (!isRunning) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true } 
                });
                
                source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
                
                isRunning = true;
                document.getElementById('toggleBtn').innerText = "COUPER LE MICRO";
                document.getElementById('toggleBtn').className = "btn btn-stop";
                update();
            } catch (err) {
                alert("Impossible d'accéder au micro : " + err);
            }
        } else {
            stopMicrophone();
        }
    }

    function stopMicrophone() {
        isRunning = false;
        if (stream) stream.getTracks().forEach(track => track.stop());
        if (audioCtx) audioCtx.close();
        cancelAnimationFrame(animationId);
        
        document.getElementById('toggleBtn').innerText = "ACTIVER LE MICRO";
        document.getElementById('toggleBtn').className = "btn btn-start";
        document.getElementById('note').innerText = "--";
        document.getElementById('octave').innerText = "";
        document.getElementById('freq').innerText = "00.00 Hz";
        document.getElementById('needle').style.left = "50%";
        document.getElementById('vumeter').style.width = "0%";
    }

    function autoCorrelate(buffer, sampleRate) {
        let rms = 0;
        for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
        rms = Math.sqrt(rms / buffer.length);
        
        // VU-mètre visuel
        document.getElementById('vumeter').style.width = Math.min(rms * 500, 100) + "%";

        if (rms < 0.015) return -1; // Seuil de silence relevé pour éviter la sensibilité

        let r1 = 0, r2 = buffer.length - 1, thres = 0.2;
        for (let i = 0; i < buffer.length / 2; i++) if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
        for (let i = 1; i < buffer.length / 2; i++) if (Math.abs(buffer[buffer.length - i]) < thres) { r2 = buffer.length - i; break; }

        let buf = buffer.slice(r1, r2);
        let c = new Array(buf.length).fill(0);
        for (let i = 0; i < buf.length; i++)
            for (let j = 0; j < buf.length - i; j++)
                c[i] = c[i] + buf[j] * buf[j + i];

        let d = 0; while (c[d] > c[d + 1]) d++;
        let maxval = -1, maxpos = -1;
        for (let i = d; i < buf.length; i++) {
            if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
        }
        return sampleRate / maxpos;
    }

    function update() {
        if (!isRunning) return;

        const dataArray = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(dataArray);
        let freq = autoCorrelate(dataArray, audioCtx.sampleRate);

        if (freq !== -1 && freq < 3000) {
            let number = 12 * (Math.log(freq / 440) / Math.log(2)) + 69;
            let noteIndex = Math.round(number) % 12;
            let octave = Math.floor(Math.round(number) / 12) - 1;
            let cents = (number - Math.round(number)) * 100;

            // LISSAGE : On applique une moyenne pour éviter les sauts
            lastCents = (lastCents * smoothing) + (cents * (1 - smoothing));

            document.getElementById('note').innerText = noteStrings[noteIndex];
            document.getElementById('octave').innerText = octave;
            document.getElementById('freq').innerText = freq.toFixed(2) + " Hz";
            
            let pos = 50 + lastCents;
            document.getElementById('needle').style.left = pos + "%";

            // Couleur dynamique
            const color = Math.abs(lastCents) < 5 ? "var(--accent)" : (Math.abs(lastCents) < 15 ? "var(--warning)" : "var(--danger)");
            document.getElementById('needle').style.background = color;
        }

        animationId = requestAnimationFrame(update);
    }

    document.getElementById('toggleBtn').onclick = toggleMicrophone;
</script>

</body>
</html>
