<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accordeur</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }
        #note { font-size: 5rem; font-weight: bold; color: #3498db; margin: 0; }
        #octave { font-size: 1.5rem; color: #666; }
        
        .gauge {
            width: 100%; height: 50px; background: #222;
            margin: 20px 0; border-radius: 10px; position: relative; overflow: hidden;
        }
        #needle {
            position: absolute; left: 50%; top: 0;
            width: 4px; height: 100%; background: #3498db;
            transform: translateX(-50%);
            transition: left 0.2s ease-out;
        }
        .center-line {
            position: absolute; left: 50%; width: 2px; height: 100%;
            background: rgba(255,255,255,0.2); z-index: 1;
        }

        .controls { display: flex; gap: 10px; width: 100%; }
        .btn {
            flex: 1; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; font-size: 1rem; cursor: pointer;
        }
        #startBtn { background: #3498db; color: white; }
        #stopBtn { background: #e74c3c; color: white; display: none; } /* Caché au début */
        
        .freq { font-family: monospace; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div><span id="note">--</span><span id="octave"></span></div>
    <div id="freq" class="freq">0.00 Hz</div>

    <div class="gauge">
        <div class="center-line"></div>
        <div id="needle"></div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn">DÉMARRER</button>
        <button id="stopBtn" class="btn">STOP (COUPER)</button>
    </div>
</div>

<script>
    let audioCtx = null, stream = null, analyser = null;
    let isRunning = false;
    let lastCents = 0;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    async function start() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            
            let source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096;
            source.connect(analyser);
            
            isRunning = true;
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            update();
        } catch (e) { alert("Micro non détecté. Vérifie les autorisations."); }
    }

    function stop() {
        isRunning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();
        
        startBtn.style.display = "block";
        stopBtn.style.display = "none";
        document.getElementById('note').innerText = "--";
        document.getElementById('octave').innerText = "";
        document.getElementById('needle').style.left = "50%";
    }

    function update() {
        if (!isRunning) return;
        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        
        let freq = pitchDetect(buffer, audioCtx.sampleRate);
        if (freq > 0) {
            let number = 12 * (Math.log(freq / 440) / Math.log(2)) + 69;
            let noteStrings = ["Do", "Do♯", "Ré", "Ré♯", "Mi", "Fa", "Fa♯", "Sol", "Sol♯", "La", "La♯", "Si"];
            let noteIndex = Math.round(number) % 12;
            let octave = Math.floor(Math.round(number) / 12) - 1;
            let cents = (number - Math.round(number)) * 100;

            // Lissage pour smartphone
            lastCents = (lastCents * 0.7) + (cents * 0.3);

            document.getElementById('note').innerText = noteStrings[noteIndex];
            document.getElementById('octave').innerText = octave;
            document.getElementById('freq').innerText = freq.toFixed(2) + " Hz";
            document.getElementById('needle').style.left = (50 + lastCents) + "%";
            document.getElementById('needle').style.background = Math.abs(lastCents) < 5 ? "#2ecc71" : "#3498db";
        }
        requestAnimationFrame(update);
    }

    function pitchDetect(buffer, sampleRate) {
        let n = buffer.length, sum = 0;
        for (let i = 0; i < n; i++) sum += buffer[i] * buffer[i];
        if (Math.sqrt(sum / n) < 0.02) return -1;

        let correlations = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n - i; j++) correlations[i] += buffer[j] * buffer[j + i];
        }
        let d = 0; while (correlations[d] > correlations[d + 1]) d++;
        let maxval = -1, maxpos = -1;
        for (let i = d; i < n; i++) {
            if (correlations[i] > maxval) { maxval = correlations[i]; maxpos = i; }
        }
        return sampleRate / maxpos;
    }

    startBtn.onclick = start;
    stopBtn.onclick = stop;
</script>
</body>
</html>
